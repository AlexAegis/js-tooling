# managed-by-autotool
packages:
  - apps/*
  - examples/*
  - fixtures/*
  - libs/*
  - packages/*

# Prevent recursive `pnpm install` from being triggered by lifecycle/run scripts
# (e.g. `vite build` inside `postinstall`), which would re-enter `postinstall`.
verifyDepsBeforeRun: false

# pnpm 10+ requires explicit approval for build/lifecycle scripts of dependencies.
# Map of package name -> boolean. `true` = run the package's install scripts.
allowBuilds:
  esbuild: true
  svelte-preprocess: true

# pnpm 11+ defaults `minimumReleaseAge` to 1440 (24h): freshly published
# packages are delayed before they can be installed, mitigating supply-chain
# attacks that rely on a compromised version being pulled in immediately.
# Keep the delay for third-party packages, but exclude our own `@alexaegis`
# scope so our just-published packages propagate across repos without waiting.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@alexaegis/*'
